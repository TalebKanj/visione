name: Publish Release to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/visione

jobs:
  publish-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: visione/services/core
            name: core
          - path: visione/services/analysis/features-aladin
            name: features-aladin
          - path: visione/services/analysis/features-clip
            name: features-clip
          - path: visione/services/analysis/features-clip2video
            name: features-clip2video
          - path: visione/services/analysis/features-clipvip
            name: features-clipvip
          - path: visione/services/analysis/features-dinov2
            name: features-dinov2
          - path: visione/services/analysis/features-openclip
            name: features-openclip
          - path: visione/services/analysis/frame-cluster
            name: frame-cluster
          - path: visione/services/analysis/objects-colors
            name: objects-colors
          - path: visione/services/analysis/objects-mmdet
            name: objects-mmdet
          - path: visione/services/analysis/objects-openimagesv4
            name: objects-openimagesv4
          - path: visione/services/analysis/scene-detection
            name: scene-detection
          - path: visione/services/index/faiss-index-manager
            name: faiss-index-manager
          - path: visione/services/index/lucene-index-manager
            name: lucene-index-manager
          - path: visione/services/index/str-feature-encoder
            name: str-feature-encoder
          - path: visione/services/index/str-object-encoder
            name: str-object-encoder
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
